<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comida Lucrativa AI</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
width:420px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

h1{
color:#ff7a00;
}

p{
color:#666;
margin-bottom:25px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.calc{
background:#ff7a00;
color:white;
}

.cardapio{
background:#6a5acd;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>Comida Lucrativa AI</h1>

<p>Descubra o que vender e quanto você pode ganhar</p>

<button class="calc" onclick="abrirCalculadora()">
📊 Calculadora de Lucro
</button>

<button class="cardapio" onclick="abrirCardapio()">
🍲 Gerador de Cardápio Lucrativo
</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const aluno = params.get("aluno");

function abrirCalculadora(){

if(aluno === "1"){
window.location.href="santosjoaldo-sys/calculadora-cuscuz?aluno=1";
}else{
window.location.href="santosjoaldo-sys/calculadora-cuscuz";
}

}

function abrirCardapio(){

if(aluno === "1"){
window.location.href="gerador-cardapio.html?aluno=1";
}else{
window.location.href="gerador-cardapio.html";
}

}

</script>

</body>
</html>
