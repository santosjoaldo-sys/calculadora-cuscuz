<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comida Lucrativa AI</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
background:white;
padding:40px;
width:100%;
max-width:420px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

h1{
color:#ff7a00;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:25px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
color:white;
}

.calc{
background:#ff7a00;
}

.cardapio{
background:#6a5acd;
}

.nomes{
background:#ff4d4d;
}

.combos{
background:#3498db;
}

.post{
background:#2ecc71;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>Comida Lucrativa AI</h1>

<p>Descubra o que vender e quanto você pode ganhar</p>

<button class="calc" onclick="abrirCalculadora()">
📊 Calculadora de Lucro
</button>

<button class="cardapio" onclick="abrirCardapio()">
🍲 Gerador de Cardápio
</button>

<button class="nomes" onclick="abrirNomes()">
🔥 Gerador de Nomes de Pratos
</button>

<button class="combos" onclick="abrirCombos()">
📦 Gerador de Combos
</button>

<button class="post" onclick="abrirPost()">
📣 Gerador de Post para Instagram
</button>

</div>

<script>

function getAluno(){
const params = new URLSearchParams(window.location.search);
return params.get("aluno");
}

function abrirCalculadora(){

const aluno = getAluno();

if(aluno === "1"){
window.location.href="santosjoaldo-sys/calculadora-cuscuz.html?aluno=1";
}else{
window.location.href="santosjoaldo-sys/calculadora-cuscuz.html";
}

}

function abrirCardapio(){

const aluno = getAluno();

if(aluno === "1"){
window.location.href="gerador-cardapio.html?aluno=1";
}else{
window.location.href="gerador-cardapio.html";
}

}

function abrirNomes(){

const aluno = getAluno();

if(aluno === "1"){
window.location.href="gerador-nomes.html?aluno=1";
}else{
window.location.href="gerador-nomes.html";
}

}

function abrirCombos(){

const aluno = getAluno();

if(aluno === "1"){
window.location.href="gerador-combos.html?aluno=1";
}else{
window.location.href="gerador-combos.html";
}

}

function abrirPost(){

const aluno = getAluno();

if(aluno === "1"){
window.location.href="gerador-post.html?aluno=1";
}else{
window.location.href="gerador-post.html";
}

}

</script>

</body>
</html>
