<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Cardápio Lucrativo</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:40px 0;
margin:0;
}

.container{
background:white;
padding:25px;
width:90%;
max-width:450px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#6a5acd;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#fafafa;
padding:15px;
border-radius:8px;
max-height:300px;
overflow:auto;
white-space:pre-line;
text-align:left;
}

.barra{
font-size:22px;
letter-spacing:5px;
margin-top:10px;
}

.checkout{
background:#ff7a00;
animation:pulsar 1.2s infinite;
}

@keyframes pulsar{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="container">

<h2>🍲 Gerador de Cardápio</h2>

<div>Testes restantes</div>
<div id="barra" class="barra"></div>

<input id="tipo" placeholder="Tipo de comida">
<input id="meta" placeholder="Meta diária">
<input id="custo" placeholder="Custo por unidade">

<button onclick="gerar()">Gerar Cardápio</button>

<div class="result" id="resultado"></div>

<button onclick="copiar()">📋 Copiar</button>
<button onclick="whatsapp()">📲 WhatsApp</button>
<button onclick="limpar()">🗑 Limpar</button>
<button onclick="voltar()">⬅ Voltar</button>

<div id="checkout"></div>

</div>

<script>

const params=new URLSearchParams(window.location.search);
const aluno=params.get("aluno");

let testes=parseInt(localStorage.getItem("testes_total"))||0;

if(aluno==="1"){testes=0;}

function barra(){

let restante=aluno==="1"?3:Math.max(0,3-testes)

let b=""

for(let i=0;i<restante;i++){b+="🟩"}
for(let i=restante;i<3;i++){b+="⬜"}

document.getElementById("barra").innerText=b

}

barra()

async function gerar(){

if(aluno!=="1" && testes>=3){

resultado.innerHTML="🚫 Testes gratuitos finalizados."

checkout.innerHTML='<button class="checkout" onclick="checkout()">🔥 DESBLOQUEAR TODAS AS FERRAMENTAS</button>'

return
}

if(aluno!=="1"){
testes++
localStorage.setItem("testes_total",testes)
}

barra()

const tipo=document.getElementById("tipo").value
const meta=document.getElementById("meta").value
const custo=document.getElementById("custo").value

const res=await fetch("/api/cardapio",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({tipo,meta,custo})
})

const data=await res.json()

resultado.innerText=data.resultado

if(testes===3 && aluno!=="1"){

checkout.innerHTML=`<div style="margin-top:20px">

⚠️ Este foi seu último teste gratuito.

<button class="checkout" onclick="checkout()">
🔥 DESBLOQUEAR TODAS AS FERRAMENTAS
</button>

</div>`

}

}

function copiar(){
navigator.clipboard.writeText(resultado.innerText)
}

function whatsapp(){
let t=encodeURIComponent(resultado.innerText)
window.open("https://wa.me/?text="+t)
}

function limpar(){
resultado.innerText=""
}

function voltar(){
window.location.href="app.html"+(aluno==="1"?"?aluno=1":"")
}

function checkout(){
window.open("https://pay.hotmart.com/K92944551N?off=m4vo1hl6&checkoutMode=10","_blank")
}

</script>

</body>
</html>
