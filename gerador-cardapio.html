<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Cardápio Lucrativo</title>

<style>

body{
font-family:Arial;
background:#f5e9d8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
background:white;
padding:30px;
width:100%;
max-width:420px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#ff7a00;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
}

.card{
background:#f7f7f7;
padding:12px;
margin-bottom:10px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.comprar{
margin-top:20px;
text-align:center;
}

.comprar a{
display:inline-block;
background:#ff7a00;
color:white;
padding:14px;
border-radius:8px;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h2>🍲 Gerador de Cardápio Lucrativo</h2>

<input id="tipo" placeholder="Digite o tipo de comida (ex: Pizza, Cuscuz, Marmita)">

<input id="meta" placeholder="Meta diária (ex: 200)">

<input id="custo" placeholder="Custo por unidade (ex: 8)">

<button onclick="gerar()">Gerar Cardápio</button>

<div class="result" id="resultado"></div>

</div>

<script>

const LIMITE_USOS = 3;

function verificarUso(){

const params = new URLSearchParams(window.location.search);

const aluno = params.get("aluno");

if(aluno === "1"){
return true;
}

let usos = localStorage.getItem("usos_app");

if(usos === null){
localStorage.setItem("usos_app",0);
usos = 0;
}

usos = parseInt(usos);

if(usos >= LIMITE_USOS){

document.getElementById("resultado").innerHTML = `
<div class="card">

<h3>🚫 Testes gratuitos finalizados</h3>

<p>Você já utilizou os 3 testes gratuitos da ferramenta.</p>

<p>Para continuar usando e aprender a vender essas ideias:</p>

<div class="comprar">

<a href="https://pay.hotmart.com/K92944551N?off=m4vo1hl6&checkoutMode=10">

🔥 QUERO COMPRAR O CURSO

</a>

</div>

</div>
`;

return false;
}

return true;
}

function registrarUso(){

const params = new URLSearchParams(window.location.search);

const aluno = params.get("aluno");

if(aluno === "1"){
return;
}

let usos = localStorage.getItem("usos_app");

usos = parseInt(usos);

usos++;

localStorage.setItem("usos_app", usos);

}

async function gerar(){

if(!verificarUso()){
return;
}

registrarUso();

const tipo = document.getElementById("tipo").value;
const meta = document.getElementById("meta").value;
const custo = document.getElementById("custo").value;

const res = await fetch("/api/cardapio",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({tipo,meta,custo})
});

const data = await res.json();

const linhas = data.resultado.split("\n");

let html = "";

linhas.forEach(linha => {

if(linha.trim() === "") return;

let icone = "🍲";

const texto = linha.toLowerCase();

if(texto.includes("preço")) icone = "💰";
if(texto.includes("unidades")) icone = "📊";
if(texto.includes("meta")) icone = "🎯";

html += `<div class="card">${icone} ${linha}</div>`;

});

document.getElementById("resultado").innerHTML = html;

}

</script>

</body>
</html>
