<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Cardápio Lucrativo</title>

<style>

body{
font-family:Arial;
background:#f5e9d8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
background:white;
padding:30px;
width:100%;
max-width:420px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#ff7a00;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
}

.card{
background:#f7f7f7;
padding:12px;
margin-bottom:10px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.actions button{
background:#6a5acd;
margin-top:8px;
}

.voltar{
background:#888;
}

</style>

</head>

<body>

<div class="container">

<h2>🍲 Gerador de Cardápio Lucrativo</h2>

<input id="tipo" placeholder="Digite o tipo de comida">

<input id="meta" placeholder="Meta diária">

<input id="custo" placeholder="Custo por unidade">

<button onclick="gerar()">Gerar Cardápio</button>

<div class="result" id="resultado"></div>

<div class="actions">

<button onclick="copiar()">📋 Copiar</button>

<button onclick="whatsapp()">📲 Enviar WhatsApp</button>

<button onclick="limpar()">🗑 Limpar</button>

<button class="voltar" onclick="voltar()">⬅ Voltar</button>

</div>

</div>

<script>

const LIMITE_USOS = 3;

function verificarUso(){

const params = new URLSearchParams(window.location.search);

if(params.get("aluno") === "1"){
return true;
}

let usos = localStorage.getItem("usos_cardapio");

if(usos === null){
localStorage.setItem("usos_cardapio",0);
usos = 0;
}

usos = parseInt(usos);

if(usos >= LIMITE_USOS){

document.getElementById("resultado").innerHTML = `
<div class="card">

<h3>🚫 Testes gratuitos finalizados</h3>

<p>Você já utilizou os 3 testes gratuitos.</p>

<a href="https://pay.hotmart.com/K92944551N?off=m4vo1hl6&checkoutMode=10"
style="background:#ff7a00;color:white;padding:12px;border-radius:6px;text-decoration:none;display:inline-block;margin-top:10px">

🔥 QUERO COMPRAR O CURSO

</a>

</div>
`;

return false;

}

return true;

}

function registrarUso(){

const params = new URLSearchParams(window.location.search);

if(params.get("aluno") === "1"){
return;
}

let usos = localStorage.getItem("usos_cardapio");

usos = parseInt(usos);

usos++;

localStorage.setItem("usos_cardapio",usos);

}

async function gerar(){

if(!verificarUso()){
return;
}

const tipo = document.getElementById("tipo").value.trim();
const meta = document.getElementById("meta").value.trim();
const custo = document.getElementById("custo").value.trim();

if(!tipo){
alert("Digite o tipo de comida.");
return;
}

if(!meta){
alert("Informe a meta diária.");
return;
}

if(!custo){
alert("Informe o custo por unidade.");
return;
}

registrarUso();

try{

const res = await fetch("/api/cardapio",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({tipo,meta,custo})
});

const data = await res.json();

const linhas = data.resultado.split("\n");

let html = "";

linhas.forEach(linha => {

if(linha.trim()==="") return;

html += `<div class="card">${linha}</div>`;

});

document.getElementById("resultado").innerHTML = html;

}catch(e){

document.getElementById("resultado").innerHTML =
"<div class='card'>Erro ao gerar cardápio. Tente novamente.</div>";

}

}

function copiar(){

const texto = document.getElementById("resultado").innerText;

navigator.clipboard.writeText(texto);

alert("Resultado copiado!");

}

function whatsapp(){

const texto = document.getElementById("resultado").innerText;

const url = "https://wa.me/?text=" + encodeURIComponent(texto);

window.open(url);

}

function limpar(){

document.getElementById("resultado").innerHTML="";

}

function voltar(){

const params = new URLSearchParams(window.location.search);

if(params.get("aluno") === "1"){
window.location.href="app.html?aluno=1";
}else{
window.location.href="app.html";
}

}

</script>

</body>

</html>
