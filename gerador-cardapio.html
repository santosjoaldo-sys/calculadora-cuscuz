<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Cardápio Lucrativo</title>

<style>

body{
font-family:Arial;
background:#fff7e6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#ff7a00;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h2>Gerador de Cardápio Lucrativo</h2>

<select id="comida">

<option value="cuscuz">Cuscuz Gourmet</option>
<option value="bolo">Bolo no pote</option>
<option value="pastel">Pastel</option>

</select>

<input type="number" id="meta" placeholder="Quanto quer ganhar por dia">

<input type="number" id="custo" placeholder="Custo por unidade">

<button onclick="gerar()">Gerar Cardápio</button>

<div class="result" id="resultado"></div>

</div>

<script>

function gerar(){

let comida = document.getElementById("comida").value;
let meta = document.getElementById("meta").value;
let custo = document.getElementById("custo").value;

let preco = custo * 3;

let unidades = Math.ceil(meta / (preco - custo));

let cardapio = "";

if(comida == "cuscuz"){

cardapio = `
Cuscuz carne seca<br>
Cuscuz frango cremoso<br>
Cuscuz calabresa queijo
`;

}

if(comida == "bolo"){

cardapio = `
Bolo no pote chocolate<br>
Bolo no pote ninho<br>
Bolo no pote morango
`;

}

if(comida == "pastel"){

cardapio = `
Pastel carne<br>
Pastel frango<br>
Pastel queijo
`;

}

document.getElementById("resultado").innerHTML =

`<b>Cardápio sugerido</b><br><br>

${cardapio}

<br><br>

Preço sugerido: R$${preco.toFixed(2)}

<br>

Para ganhar R$${meta} por dia venda ${unidades} unidades.

`;

}

</script>

</body>

</html>
