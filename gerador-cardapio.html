<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Cardápio</title>

<style>

body{
font-family:Arial;
background:#f5e9d8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
background:white;
padding:30px;
width:100%;
max-width:420px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

select,input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#ff7a00;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.result{
margin-top:20px;
}

.card{

background:#f7f7f7;

padding:12px;

margin-bottom:10px;

border-radius:8px;

box-shadow:0 3px 8px rgba(0,0,0,0.1);

font-size:15px;

}

.voltar{
position:fixed;
top:20px;
left:20px;
background:#ff7a00;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
width:auto;
}

.copiar{
background:#6a5acd;
}

.whatsapp{
background:#25D366;
}

.limpar{
background:#888;
}

</style>

</head>

<body>

<button class="voltar" onclick="voltarMenu()">⬅ Voltar ao Menu</button>

<div class="container">

<h2>Gerador de Cardápio Lucrativo</h2>

<select id="tipo">
<option>Cuscuz Gourmet</option>
<option>Hambúrguer</option>
<option>Pastel</option>
<option>Bolo Caseiro</option>
</select>

<input id="meta" placeholder="Meta diária (ex: 200)">

<input id="custo" placeholder="Custo por unidade (ex: 8)">

<button onclick="gerar()">Gerar Cardápio</button>

<div class="result" id="resultado"></div>

<button class="copiar" onclick="copiarResultado()">📋 Copiar Resultado</button>

<button class="whatsapp" onclick="enviarWhatsapp()">📲 Enviar para WhatsApp</button>

<button class="limpar" onclick="limparResultado()">🗑 Limpar</button>

</div>

<script>

async function gerar(){

const tipo = document.getElementById("tipo").value;
const meta = document.getElementById("meta").value;
const custo = document.getElementById("custo").value;

const res = await fetch("/api/cardapio",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({tipo,meta,custo})
});

const data = await res.json();

const linhas = data.resultado.split("\n");

let html = "";

linhas.forEach(linha => {

if(linha.trim() === "") return;

let icone = "🍲";

const texto = linha.toLowerCase();

if(texto.includes("preço")) icone = "💰";
if(texto.includes("unidades")) icone = "📊";
if(texto.includes("meta")) icone = "🎯";

html += `<div class="card">${icone} ${linha}</div>`;

});

document.getElementById("resultado").innerHTML = html;

}

function voltarMenu(){
window.location.href = "index.html";
}

function copiarResultado(){

const texto = document.getElementById("resultado").innerText;

navigator.clipboard.writeText(texto);

alert("Resultado copiado!");

}

function enviarWhatsapp(){

const texto = document.getElementById("resultado").innerText;

const url = "https://wa.me/?text=" + encodeURIComponent(texto);

window.open(url);

}

function limparResultado(){

document.getElementById("resultado").innerHTML = "";

}

</script>

</body>
</html>
