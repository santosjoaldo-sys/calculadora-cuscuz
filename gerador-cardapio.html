<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Cardápio</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
width:90%;
max-width:450px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#6a5acd;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
text-align:left;
}

.checkout{
margin-top:20px;
background:#ff7a00;
}

</style>

</head>

<body>

<div class="container">

<h2>🍲 Gerador de Cardápio Lucrativo</h2>

<p id="contador"></p>

<input id="tipo" placeholder="Digite o tipo de comida">
<input id="meta" placeholder="Meta diária">
<input id="custo" placeholder="Custo por unidade">

<button onclick="gerar()">Gerar Cardápio</button>

<div class="result" id="resultado"></div>

<button onclick="copiar()">📋 Copiar</button>
<button onclick="whatsapp()">📲 Enviar WhatsApp</button>
<button onclick="limpar()">🗑 Limpar</button>
<button onclick="voltar()">⬅ Voltar</button>

<div id="checkout"></div>

</div>

<script>

let testes = localStorage.getItem("testes") || 0

document.getElementById("contador").innerText =
"⚡ Você ainda tem " + (3 - testes) + " teste(s) gratuito(s)."

async function gerar(){

testes++

localStorage.setItem("testes", testes)

if(testes > 3){

document.getElementById("resultado").innerHTML = `
<h3>🚫 Testes gratuitos finalizados</h3>
<p>Você já utilizou os 3 testes gratuitos.</p>
`

document.getElementById("checkout").innerHTML = `
<button class="checkout" onclick="checkout()">
🔥 QUERO DESBLOQUEAR O CURSO
</button>
`

return
}

const tipo = document.getElementById("tipo").value
const meta = document.getElementById("meta").value
const custo = document.getElementById("custo").value

const res = await fetch("/api/cardapio",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({tipo,meta,custo})
})

const data = await res.json()

document.getElementById("resultado").innerText = data.resultado

document.getElementById("contador").innerText =
"⚡ Você ainda tem " + (3 - testes) + " teste(s) gratuito(s)."

}

function copiar(){
navigator.clipboard.writeText(
document.getElementById("resultado").innerText
)
}

function whatsapp(){

let texto = encodeURIComponent(
document.getElementById("resultado").innerText
)

window.open("https://wa.me/?text=" + texto)

}

function limpar(){

document.getElementById("resultado").innerText = ""

}

function voltar(){

window.location.href="app.html"

}

function checkout(){

window.open("SEU_LINK_HOTMART_AQUI")

}

</script>

</body>
</html>
