<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Cardápio Lucrativo</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:40px 0;
margin:0;
}

.container{
background:white;
padding:25px;
width:90%;
max-width:450px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:5px;
}

.sub{
color:#777;
font-size:14px;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#6a5acd;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.result{
margin-top:20px;
text-align:left;
background:#fafafa;
padding:15px;
border-radius:8px;
max-height:300px;
overflow:auto;
white-space:pre-line;
}

#loader{
display:none;
margin-top:20px;
font-weight:bold;
color:#6a5acd;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

.barra{
margin-top:10px;
font-size:22px;
letter-spacing:5px;
}

.checkout{
margin-top:20px;
background:#ff7a00;
font-weight:bold;
animation:pulsar 1.2s infinite;
}

@keyframes pulsar{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

.valor{
margin-top:15px;
font-size:15px;
color:#333;
background:#f7f7f7;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h2>🍲 Gerador de Cardápio Lucrativo</h2>

<div class="sub">
Descubra ideias de comida para vender todos os dias
</div>

<div>
<strong>Testes gratuitos restantes</strong>
<div id="barra" class="barra"></div>
</div>

<input id="tipo" placeholder="Digite o tipo de comida">

<input id="meta" placeholder="Meta diária (ex: 150)">

<input id="custo" placeholder="Custo por unidade">

<button onclick="gerar()">Gerar Cardápio</button>

<div id="loader">
🤖 Comida Lucrativa AI está criando seu cardápio...
</div>

<div class="result" id="resultado"></div>

<div class="valor" id="valor"></div>

<button onclick="copiar()">📋 Copiar Resultado</button>

<button onclick="whatsapp()">📲 Enviar para WhatsApp</button>

<button onclick="limpar()">🗑 Limpar</button>

<button onclick="voltar()">⬅ Voltar</button>

<div id="checkout"></div>

</div>

<script>

let testes = localStorage.getItem("testes") || 0

function atualizarBarra(){

let restante = 3 - testes

let barra=""

for(let i=0;i<restante;i++){
barra+="🟩"
}

for(let i=restante;i<3;i++){
barra+="⬜"
}

document.getElementById("barra").innerText=barra

}

atualizarBarra()

async function gerar(){

testes++

localStorage.setItem("testes",testes)

atualizarBarra()

if(testes>3){

document.getElementById("resultado").innerHTML=
"🚫 Testes gratuitos finalizados\n\nVocê já utilizou os 3 testes gratuitos."

document.getElementById("checkout").innerHTML=
'<button class="checkout" onclick="checkout()">🔥 DESBLOQUEAR TODAS AS FERRAMENTAS</button>'

return
}

document.getElementById("loader").style.display="block"

document.getElementById("resultado").innerText=""

document.getElementById("valor").innerText=""

await new Promise(resolve=>setTimeout(resolve,1200))

const tipo=document.getElementById("tipo").value
const meta=document.getElementById("meta").value
const custo=document.getElementById("custo").value

const res=await fetch("/api/cardapio",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({tipo,meta,custo})
})

const data=await res.json()

document.getElementById("loader").style.display="none"

document.getElementById("resultado").innerText=data.resultado

if(meta){

let lucroMes = meta*30

document.getElementById("valor").innerHTML=
"💰 Se você vender todos os dias pode faturar cerca de <b>R$ "+lucroMes+"</b> por mês."

}

}

function copiar(){

navigator.clipboard.writeText(
document.getElementById("resultado").innerText
)

alert("Resultado copiado!")

}

function whatsapp(){

let texto=encodeURIComponent(
document.getElementById("resultado").innerText
)

window.open("https://wa.me/?text="+texto)

}

function limpar(){

document.getElementById("resultado").innerText=""
document.getElementById("valor").innerText=""

}

function voltar(){

window.location.href="app.html"

}

function checkout(){

window.open("https://pay.hotmart.com/K92944551N?off=m4vo1hl6&checkoutMode=10")

}

</script>

</body>
</html>
