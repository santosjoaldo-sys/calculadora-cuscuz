<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Combos</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
width:90%;
max-width:450px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#6a5acd;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h2>📦 Gerador de Combos Lucrativos</h2>

<input id="tipo" placeholder="Tipo de comida">

<button onclick="gerar()">Gerar Combos</button>

<div class="result" id="resultado"></div>

<button onclick="copiar()">📋 Copiar</button>
<button onclick="whatsapp()">📲 Enviar WhatsApp</button>
<button onclick="limpar()">🗑 Limpar</button>
<button onclick="voltar()">⬅ Voltar</button>

</div>

<script>

async function gerar(){

const tipo = document.getElementById("tipo").value

const res = await fetch("/api/combos",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({tipo})
})

const data = await res.json()

document.getElementById("resultado").innerText = data.resultado

}

function copiar(){
navigator.clipboard.writeText(
document.getElementById("resultado").innerText
)
}

function whatsapp(){

let texto = encodeURIComponent(
document.getElementById("resultado").innerText
)

window.open("https://wa.me/?text=" + texto)

}

function limpar(){

document.getElementById("resultado").innerText = ""

}

function voltar(){

window.location.href="app.html"

}

</script>

</body>
</html>
