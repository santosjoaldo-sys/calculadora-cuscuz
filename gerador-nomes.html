<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Nomes</title>

<style>

body{
font-family:Arial;
background:#f5e9d8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
background:white;
padding:30px;
width:100%;
max-width:420px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#ff4d4d;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.card{
background:#f7f7f7;
padding:12px;
margin-top:10px;
border-radius:8px;
}

.actions button{
background:#6a5acd;
margin-top:8px;
}

.voltar{
background:#888;
}

</style>

</head>

<body>

<div class="container">

<h2>🔥 Gerador de Nomes de Pratos</h2>

<input id="produto" placeholder="Ex: Cuscuz Gourmet">

<button onclick="gerar()">Gerar Nomes</button>

<div id="resultado"></div>

<div class="actions">

<button onclick="copiar()">📋 Copiar</button>

<button onclick="whatsapp()">📲 Enviar WhatsApp</button>

<button onclick="limpar()">🗑 Limpar</button>

<button class="voltar" onclick="voltar()">⬅ Voltar</button>

</div>

</div>

<script>

const LIMITE_USOS = 3;

function verificarUso(){

const params = new URLSearchParams(window.location.search);

if(params.get("aluno") === "1"){
return true;
}

let usos = localStorage.getItem("usos_app");

if(usos === null){
localStorage.setItem("usos_app",0);
usos = 0;
}

usos = parseInt(usos);

if(usos >= LIMITE_USOS){

document.getElementById("resultado").innerHTML = `
<div class="card">

<h3>🚫 Testes gratuitos finalizados</h3>

<a href="https://pay.hotmart.com/K92944551N?off=m4vo1hl6&checkoutMode=10" 
style="background:#ff7a00;color:white;padding:12px;border-radius:6px;text-decoration:none">

🔥 QUERO COMPRAR O CURSO

</a>

</div>
`;

return false;

}

return true;

}

function registrarUso(){

const params = new URLSearchParams(window.location.search);

if(params.get("aluno") === "1"){
return;
}

let usos = localStorage.getItem("usos_app");

usos = parseInt(usos);

usos++;

localStorage.setItem("usos_app",usos);

}

async function gerar(){

if(!verificarUso()) return;

registrarUso();

const produto = document.getElementById("produto").value;

const res = await fetch("/api/nomes",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({produto})
});

const data = await res.json();

const linhas = data.resultado.split("\n");

let html="";

linhas.forEach(linha=>{

if(linha.trim()==="") return;

html += `<div class="card">🍲 ${linha}</div>`;

});

document.getElementById("resultado").innerHTML = html;

}

function copiar(){

const texto=document.getElementById("resultado").innerText;

navigator.clipboard.writeText(texto);

alert("Resultado copiado!");

}

function whatsapp(){

const texto=document.getElementById("resultado").innerText;

window.open("https://wa.me/?text="+encodeURIComponent(texto));

}

function limpar(){

document.getElementById("resultado").innerHTML="";

}

function voltar(){

window.location.href="index.html";

}

</script>

</body>
</html>
