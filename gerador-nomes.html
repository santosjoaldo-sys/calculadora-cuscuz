<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Nomes</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:25px;
width:90%;
max-width:450px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#ff7a00;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
text-align:left;
white-space:pre-line;
}

</style>

</head>

<body>

<div class="container">

<h2>🔥 Gerador de Nomes de Pratos</h2>

<input id="produto" placeholder="Ex: Cuscuz Gourmet">

<button onclick="gerar()">Gerar Nomes</button>

<div class="result" id="resultado"></div>

</div>

<script>

const LIMITE_USOS = 3

function verificarUso(){

const params = new URLSearchParams(window.location.search)

if(params.get("aluno") === "1"){
return true
}

let usos = parseInt(localStorage.getItem("usos_app") || "0")

if(usos >= LIMITE_USOS){

document.getElementById("resultado").innerHTML = `

<h3>🚫 Testes gratuitos finalizados</h3>

<p>Você já utilizou os 3 testes gratuitos.</p>

<a href="https://pay.hotmart.com/K92944551N?off=m4vo1hl6&checkoutMode=10"
style="background:#ff7a00;color:white;padding:12px;border-radius:6px;text-decoration:none;display:inline-block;margin-top:10px">

🔥 QUERO COMPRAR O CURSO

</a>

`

return false

}

return true

}

function registrarUso(){

const params = new URLSearchParams(window.location.search)

if(params.get("aluno") === "1"){
return
}

let usos = parseInt(localStorage.getItem("usos_app") || "0")

usos++

localStorage.setItem("usos_app", usos)

}

async function gerar(){

if(!verificarUso()){
return
}

const produto=document.getElementById("produto").value

if(!produto){

document.getElementById("resultado").innerText="Digite o tipo de comida"

return

}

const res=await fetch("/api/nomes",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({produto})
})

const data=await res.json()

document.getElementById("resultado").innerText=data.resultado

registrarUso()

}

</script>

</body>
</html>
