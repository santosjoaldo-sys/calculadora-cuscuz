<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Post</title>

<style>

body{font-family:Arial;background:#fff5e6;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:40px 0;margin:0;}

.container{background:white;padding:25px;width:90%;max-width:450px;border-radius:12px;box-shadow:0 10px 20px rgba(0,0,0,0.1);text-align:center;}

input{width:100%;padding:10px;margin-top:10px;border-radius:6px;border:1px solid #ddd;}

button{width:100%;padding:12px;margin-top:12px;background:#2ecc71;color:white;border:none;border-radius:6px;}

.result{margin-top:20px;background:#fafafa;padding:15px;border-radius:8px;max-height:300px;overflow:auto;white-space:pre-line;text-align:left;}

.barra{font-size:22px;letter-spacing:5px;margin-top:10px;}

</style>

</head>

<body>

<div class="container">

<h2>📣 Gerador de Post</h2>

<div>Testes restantes</div>
<div id="barra" class="barra"></div>

<input id="tipo" placeholder="Tipo de comida">
<input id="promo" placeholder="Promoção">

<button onclick="gerar()">Gerar Post</button>

<div class="result" id="resultado"></div>

<button onclick="copiar()">📋 Copiar</button>
<button onclick="whatsapp()">📲 WhatsApp</button>
<button onclick="limpar()">🗑 Limpar</button>
<button onclick="voltar()">⬅ Voltar</button>

<div id="checkout"></div>

</div>

<script>

const params=new URLSearchParams(window.location.search);
const aluno=params.get("aluno");

let testes=localStorage.getItem("testes")||0;

if(aluno==="1"){testes=0;}

function barra(){

let restante=aluno==="1"?3:3-testes

let b=""

for(let i=0;i<restante;i++){b+="🟩"}
for(let i=restante;i<3;i++){b+="⬜"}

barra.innerText=b
}

barra()

async function gerar(){

if(aluno!=="1"){
testes++
localStorage.setItem("testes",testes)
}

barra()

if(testes>3 && aluno!=="1"){

resultado.innerHTML="🚫 Testes finalizados."

checkout.innerHTML='<button onclick="checkout()">🔥 DESBLOQUEAR</button>'

return
}

const tipo=document.getElementById("tipo").value
const promo=document.getElementById("promo").value

const res=await fetch("/api/post",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({tipo,promo})
})

const data=await res.json()

resultado.innerText=data.resultado

}

function copiar(){navigator.clipboard.writeText(resultado.innerText)}

function whatsapp(){
let t=encodeURIComponent(resultado.innerText)
window.open("https://wa.me/?text="+t)
}

function limpar(){resultado.innerText=""}

function voltar(){
window.location.href="app.html"+(aluno==="1"?"?aluno=1":"")
}

function checkout(){
window.open("https://pay.hotmart.com/K92944551N?off=m4vo1hl6&checkoutMode=10","_blank")
}

</script>

</body>
</html>
