<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Post</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:40px 0;
margin:0;
}

.container{
background:white;
padding:25px;
width:90%;
max-width:450px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#2ecc71;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#fafafa;
padding:15px;
border-radius:8px;
max-height:300px;
overflow:auto;
white-space:pre-line;
text-align:left;
}

#loader{
display:none;
margin-top:15px;
animation:pulse 1.5s infinite;
}

.barra{
font-size:22px;
letter-spacing:5px;
margin-top:10px;
}

.checkout{
background:#ff7a00;
animation:pulsar 1.2s infinite;
}

</style>

</head>

<body>

<div class="container">

<h2>📣 Gerador de Post para Instagram</h2>

<div>Testes restantes</div>
<div id="barra" class="barra"></div>

<input id="tipo" placeholder="Tipo de comida">
<input id="promo" placeholder="Promoção">

<button onclick="gerar()">Gerar Post</button>

<div id="loader">🤖 Criando post...</div>

<div class="result" id="resultado"></div>

<button onclick="copiar()">📋 Copiar</button>
<button onclick="whatsapp()">📲 WhatsApp</button>
<button onclick="limpar()">🗑 Limpar</button>
<button onclick="voltar()">⬅ Voltar</button>

<div id="checkout"></div>

</div>

<script>

let testes=localStorage.getItem("testes")||0

function atualizarBarra(){

let restante=3-testes

let b=""

for(let i=0;i<restante;i++){b+="🟩"}
for(let i=restante;i<3;i++){b+="⬜"}

document.getElementById("barra").innerText=b

}

atualizarBarra()

async function gerar(){

testes++
localStorage.setItem("testes",testes)
atualizarBarra()

if(testes>3){

document.getElementById("resultado").innerHTML="🚫 Testes finalizados."

document.getElementById("checkout").innerHTML=
'<button class="checkout" onclick="checkout()">🔥 DESBLOQUEAR</button>'

return

}

document.getElementById("loader").style.display="block"

await new Promise(resolve=>setTimeout(resolve,1200))

const tipo=document.getElementById("tipo").value
const promo=document.getElementById("promo").value

const res=await fetch("/api/post",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({tipo,promo})
})

const data=await res.json()

document.getElementById("loader").style.display="none"

document.getElementById("resultado").innerText=data.resultado

}

function copiar(){
navigator.clipboard.writeText(document.getElementById("resultado").innerText)
}

function whatsapp(){
let t=encodeURIComponent(document.getElementById("resultado").innerText)
window.open("https://wa.me/?text="+t)
}

function limpar(){
document.getElementById("resultado").innerText=""
}

function voltar(){
window.location.href="app.html"
}

function checkout(){
window.open("https://pay.hotmart.com/K92944551N?off=m4vo1hl6&checkoutMode=10","_blank")
}

</script>

</body>
</html>
