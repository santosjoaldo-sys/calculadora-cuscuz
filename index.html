<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comida Lucrativa AI</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#f5e9d8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
background:white;
padding:35px;
width:100%;
max-width:460px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
font-size:30px;
font-weight:bold;
margin-bottom:10px;
}

.subtitulo{
font-size:15px;
color:#555;
margin-bottom:25px;
}

.botao{
display:block;
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
color:white;
}

.teste{background:#ff7a00;}

.botao:hover{
opacity:0.9;
}

.footer{
margin-top:25px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
🍲 Comida Lucrativa AI
</div>

<div class="subtitulo">
Ferramenta inteligente para descobrir comidas lucrativas para vender.
</div>

<button class="botao teste" onclick="abrir()">
🚀 TESTAR FERRAMENTA GRÁTIS
</button>

<div class="footer">
Powered by Comida Lucrativa AI
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const aluno = params.get("aluno");

function abrir(){

if(aluno === "1"){
window.location.href = "app.html?aluno=1";
}else{
window.location.href = "acesso.html";
}

}

</script>

</body>
</html>
