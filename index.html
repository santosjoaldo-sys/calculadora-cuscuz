<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comida Lucrativa AI</title>

<style>

body{
font-family: Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
background:white;
padding:30px;
width:100%;
max-width:500px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

h1{
color:#ff7a00;
margin-bottom:25px;
}

.card{
background:#f7f7f7;
padding:15px;
margin-top:12px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
background:#ececec;
}

.card strong{
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>🍲 Comida Lucrativa AI</h1>

<div class="card" onclick="abrir('gerador-cardapio.html')">
<strong>🍲 Gerador de Cardápio</strong>
</div>

<div class="card" onclick="abrir('gerador-nomes.html')">
<strong>🔥 Gerador de Nomes de Pratos</strong>
</div>

<div class="card" onclick="abrir('gerador-combos.html')">
<strong>📦 Gerador de Combos Lucrativos</strong>
</div>

<div class="card" onclick="abrir('gerador-post.html')">
<strong>📣 Gerador de Post para Instagram</strong>
</div>

</div>

<script>

function abrir(pagina){
window.location.href = pagina;
}

</script>

</body>

</html>
