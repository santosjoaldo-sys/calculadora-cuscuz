<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Comida Lucrativa AI</title>

<style>

body{

background:#f5e9d8;
display:flex;
justify-content:center;
align-items:center;

margin:0;
padding:20px;
}

.container{
background:white;
padding:35px;
width:100%;
max-width:450px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.subtitulo{
color:#555;
margin-bottom:25px;
line-height:1.4;
}

.card{
background:#f7f7f7;
padding:15px;
margin-top:12px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
font-size:16px;
}

.card:hover{
background:#ececec;
}

</style>

</head>

<body>

<div class="container">

🍲 COMIDA LUCRATIVA AI
</div>

<div class="subtitulo">
Ferramentas inteligentes para quem quer ganhar dinheiro vendendo comida.
</div>

<div class="card" onclick="abrir('gerador-cardapio.html')">
🍲 Gerador de Cardápio Lucrativo
</div>

<div class="card" onclick="abrir('gerador-nomes.html')">
🔥 Gerador de Nomes de Pratos
</div>

<div class="card" onclick="abrir('gerador-combos.html')">
📦 Gerador de Combos Lucrativos
</div>

<div class="card" onclick="abrir('gerador-post.html')">
📣 Gerador de Post para Instagram
</div>

</div>

<script>

function abrir(pagina){
window.location.href = pagina;
}

</script>

</body>
</html>
