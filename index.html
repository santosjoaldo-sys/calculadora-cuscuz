<style>
body{
font-family: Arial;

.container{
background:white;

width:100%;

button{
background:#ff9800;

padding:12px;

<body>

<div class="container">

<h2>Calculadora de Lucro do Cuscuz</h2>

<p>Descubra quanto você pode ganhar.</p>

<input type="number" id="custo" placeholder="Custo por unidade">

<input type="number" id="preco" placeholder="Preço de venda">

<input type="number" id="quantidade" placeholder="Quantidade vendida por dia">

<button onclick="calcular()">Calcular Lucro</button>

<div class="result" id="resultado"></div>

</div>

<script>

function calcular(){

let custo = document.getElementById("custo").value;

let preco = document.getElementById("preco").value;

let quantidade = document.getElementById("quantidade").value;

let lucroUnitario = preco - custo;

let lucroDia = lucroUnitario * quantidade;

let lucroMes = lucroDia * 30;

document.getElementById("resultado").innerHTML = 
`
Lucro por unidade: R$ ${lucroUnitario.toFixed(2)} <br>
Lucro por dia: R$ ${lucroDia.toFixed(2)} <br>
Lucro por mês: R$ ${lucroMes.toFixed(2)}
`;

}

</script>

</body>
