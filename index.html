<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Lucro do Cuscuz</title>

<style>

body{
font-family: Arial;
background:#fff4e6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:14px;
width:380px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
}

h1{
color:#ff7a00;
margin-bottom:10px;
}

p{
color:#666;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#ff7a00;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.result{
margin-top:20px;
font-size:18px;
}

.hidden{
display:none;
}

.whatsapp{
background:#25D366;
}

.ebook{
background:#e53935;
}

</style>

</head>

<body>

<div class="container">

<h1>Calculadora de Lucro do Cuscuz</h1>

<p>Descubra quanto você pode ganhar vendendo cuscuz.</p>

<input type="number" id="custo" placeholder="Custo por unidade">

<input type="number" id="preco" placeholder="Preço de venda">

<input type="number" id="quantidade" placeholder="Quantidade vendida por dia">

<button onclick="calcular()">Calcular lucro</button>

<div class="result" id="resultado"></div>

<div id="emailBox" class="hidden">

<h3>Desbloqueie seu lucro mensal</h3>

<input type="email" id="emailLead" placeholder="Digite seu email">

<button onclick="enviarLead()">Ver lucro mensal</button>

</div>

<div class="result" id="lucroMensal"></div>

<a href="https://wa.me/5571935009704" target="_blank">
<button class="whatsapp">Falar no WhatsApp</button>
</a>

<a href="https://pay.hotmart.com/K92944551N?checkoutMode=10" target="_blank">
<button class="ebook">Quero Receber Minhas Receitas</button>
</a>

</div>

<script>

let lucroMesGlobal = 0;

function calcular(){

let custo = parseFloat(document.getElementById("custo").value);

let preco = parseFloat(document.getElementById("preco").value);

let quantidade = parseFloat(document.getElementById("quantidade").value);

if(isNaN(custo) || isNaN(preco) || isNaN(quantidade)){

alert("Preencha todos os campos");

return;

}

let lucroUnitario = preco - custo;

let lucroDia = lucroUnitario * quantidade;

lucroMesGlobal = lucroDia * 30;

document.getElementById("resultado").innerHTML =

"Lucro por unidade: R$ " + lucroUnitario.toFixed(2) +

"<br>Lucro por dia: R$ " + lucroDia.toFixed(2);

document.getElementById("emailBox").classList.remove("hidden");

}

function enviarLead(){

let email = document.getElementById("emailLead").value;

if(email == ""){

alert("Digite seu email");

return;

}

fetch("https://formspree.io/f/xkoqzqlq",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
email: email
})

});

document.getElementById("lucroMensal").innerHTML =

"<b>Lucro por mês: R$ " + lucroMesGlobal.toFixed(2) + "</b>";

}

</script>

</body>

</html>
