<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Lucro</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:40px 0;
margin:0;
}

.container{
background:white;
padding:25px;
width:90%;
max-width:450px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

h2{
margin-bottom:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#ff7a00;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.result{
margin-top:20px;
background:#fafafa;
padding:15px;
border-radius:8px;
white-space:pre-line;
text-align:left;
}

.barra{
font-size:22px;
letter-spacing:5px;
margin-top:10px;
}

#loader{
display:none;
margin-top:15px;
font-weight:bold;
animation:pulse 1.5s infinite;
}

.checkout{
background:#ff7a00;
animation:pulsar 1.2s infinite;
}

@keyframes pulse{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

@keyframes pulsar{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

</style>

</head>

<body>

<div class="container">

<h2>📊 Calculadora de Lucro</h2>

<div>Testes gratuitos restantes</div>
<div id="barra" class="barra"></div>

<input id="custo" placeholder="Custo por unidade">

<input id="preco" placeholder="Preço de venda">

<input id="quantidade" placeholder="Quantidade vendida por dia">

<button onclick="calcular()">Calcular Lucro</button>

<div id="loader">🤖 Calculando lucro...</div>

<div class="result" id="resultado"></div>

<button onclick="copiar()">📋 Copiar</button>

<button onclick="whatsapp()">📲 WhatsApp</button>

<button onclick="limpar()">🗑 Limpar</button>

<button onclick="voltar()">⬅ Voltar</button>

<div id="checkout"></div>

</div>

<script>

let testes = localStorage.getItem("testes") || 0

function atualizarBarra(){

let restante = 3 - testes

let barra=""

for(let i=0;i<restante;i++){barra+="🟩"}
for(let i=restante;i<3;i++){barra+="⬜"}

document.getElementById("barra").innerText = barra

}

atualizarBarra()

async function calcular(){

testes++

localStorage.setItem("testes",testes)

atualizarBarra()

if(testes>3){

document.getElementById("resultado").innerHTML =
"🚫 Testes gratuitos finalizados.\n\nVocê já utilizou os 3 testes gratuitos."

document.getElementById("checkout").innerHTML =
'<button class="checkout" onclick="checkout()">🔥 DESBLOQUEAR TODAS AS FERRAMENTAS</button>'

return

}

document.getElementById("loader").style.display="block"

await new Promise(resolve=>setTimeout(resolve,1200))

let custo = parseFloat(document.getElementById("custo").value)

let preco = parseFloat(document.getElementById("preco").value)

let quantidade = parseFloat(document.getElementById("quantidade").value)

let lucroUnit = preco - custo

let lucroDia = lucroUnit * quantidade

let lucroMes = lucroDia * 30

document.getElementById("loader").style.display="none"

document.getElementById("resultado").innerText =
"Lucro por unidade: R$ "+lucroUnit.toFixed(2)+"\n"+
"Lucro por dia: R$ "+lucroDia.toFixed(2)+"\n"+
"Lucro por mês: R$ "+lucroMes.toFixed(2)

}

function copiar(){
navigator.clipboard.writeText(document.getElementById("resultado").innerText)
}

function whatsapp(){
let texto=encodeURIComponent(document.getElementById("resultado").innerText)
window.open("https://wa.me/?text="+texto)
}

function limpar(){
document.getElementById("resultado").innerText=""
}

function voltar(){
window.location.href="../app.html"
}

function checkout(){

window.open(
"https://pay.hotmart.com/K92944551N?off=m4vo1hl6&checkoutMode=10",
"_blank"
)

}

</script>

</body>
</html>
