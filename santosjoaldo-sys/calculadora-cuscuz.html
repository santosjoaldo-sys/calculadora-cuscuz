<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Lucro - Comida Lucrativa AI</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
background:white;
padding:30px;
width:100%;
max-width:420px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

h2{
color:#ff7a00;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
color:white;
}

.calcular{
background:#ff7a00;
}

.actions button{
background:#6a5acd;
}

.voltar{
background:#888;
}

.result{
margin-top:20px;
background:#f7f7f7;
padding:15px;
border-radius:8px;
text-align:left;
min-height:40px;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h2>📊 Calculadora de Lucro</h2>

<input id="custo" placeholder="Custo por unidade (ex: 4.50)">

<input id="preco" placeholder="Preço de venda (ex: 10)">

<input id="quantidade" placeholder="Quantidade vendida por dia">

<button class="calcular" onclick="calcular()">Calcular Lucro</button>

<div class="result" id="resultado"></div>

<div class="actions">

<button onclick="copiar()">📋 Copiar Resultado</button>

<button onclick="whatsapp()">📲 Enviar para WhatsApp</button>

<button onclick="limpar()">🗑 Limpar</button>

<button class="voltar" onclick="voltar()">⬅ Voltar</button>

</div>

</div>

<script>

function calcular(){

const custo=parseFloat(document.getElementById("custo").value);
const preco=parseFloat(document.getElementById("preco").value);
const quantidade=parseInt(document.getElementById("quantidade").value);

if(!custo || !preco || !quantidade){

document.getElementById("resultado").innerHTML=
"⚠️ Preencha todos os campos.";

return;

}

const lucroUnitario = preco - custo;
const lucroDia = lucroUnitario * quantidade;
const lucroMes = lucroDia * 30;

document.getElementById("resultado").innerHTML =

`
💰 Lucro por unidade: R$ ${lucroUnitario.toFixed(2)}

📅 Lucro por dia: R$ ${lucroDia.toFixed(2)}

🚀 Lucro por mês: R$ ${lucroMes.toFixed(2)}
`;

}

function copiar(){

const texto=document.getElementById("resultado").innerText;

navigator.clipboard.writeText(texto);

alert("Resultado copiado!");

}

function whatsapp(){

const texto=document.getElementById("resultado").innerText;

const url="https://wa.me/?text="+encodeURIComponent(texto);

window.open(url);

}

function limpar(){

document.getElementById("resultado").innerHTML="";

document.getElementById("custo").value="";
document.getElementById("preco").value="";
document.getElementById("quantidade").value="";

}

function voltar(){

const params=new URLSearchParams(window.location.search);

if(params.get("aluno")==="1"){
window.location.href="../app.html?aluno=1";
}else{
window.location.href="../app.html";
}

}

</script>

</body>
</html>
