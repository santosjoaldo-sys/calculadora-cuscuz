<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Lucro</title>

<style>

body{
font-family:Arial;
background:#fff5e6;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:40px 0;
margin:0;
}

.container{
background:white;
padding:25px;
width:90%;
max-width:450px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#2ecc71;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#fafafa;
padding:15px;
border-radius:8px;
white-space:pre-line;
text-align:left;
}

.barra{
font-size:22px;
letter-spacing:5px;
margin-top:10px;
}

.link-checkout{
display:block;
margin-top:20px;
font-weight:bold;
color:#ff7a00;
text-decoration:none;
font-size:18px;
}

.link-checkout:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<h2>💰 Calculadora de Lucro</h2>

<div>Testes restantes</div>
<div id="barra" class="barra"></div>

<input id="custo" placeholder="Custo do produto (R$)">
<input id="preco" placeholder="Preço de venda (R$)">
<input id="quantidade" placeholder="Quantidade vendida">

<button onclick="calcular()">Calcular Lucro</button>

<div class="result" id="resultado"></div>

<button onclick="copiar()">📋 Copiar</button>
<button onclick="whatsapp()">📲 WhatsApp</button>
<button onclick="limpar()">🗑 Limpar</button>
<button onclick="voltar()">⬅ Voltar</button>

<a class="link-checkout" href="https://pay.hotmart.com/K92944551N?off=m4vo1hl6&checkoutMode=10" target="_blank">
🔥 Página do Cuscuz Gourmet
</a>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const aluno = params.get("aluno")

let testes = parseInt(localStorage.getItem("testes_total")) || 0

if(aluno === "1"){
testes = 0
}

function barra(){

let restante = aluno === "1" ? 3 : Math.max(0, 3 - testes)

let b = ""

for(let i=0;i<restante;i++){b+="🟩"}
for(let i=restante;i<3;i++){b+="⬜"}

document.getElementById("barra").innerText = b

}

barra()

function calcular(){

if(aluno !== "1" && testes >= 3){

document.getElementById("resultado").innerText =
"🚫 Seus 3 testes gratuitos terminaram.\n\nClique em 'Página do Cuscuz Gourmet' abaixo para liberar todas as ferramentas."

return

}

const custo=parseFloat(document.getElementById("custo").value) || 0
const preco=parseFloat(document.getElementById("preco").value) || 0
const quantidade=parseInt(document.getElementById("quantidade").value) || 0

const lucroUnitario=preco-custo
const lucroTotal=lucroUnitario*quantidade

document.getElementById("resultado").innerText =
"Lucro por unidade: R$ " + lucroUnitario.toFixed(2) +
"\n\nLucro total: R$ " + lucroTotal.toFixed(2)

if(aluno !== "1"){
testes++
localStorage.setItem("testes_total",testes)
}

barra()

if(testes === 3 && aluno !== "1"){

document.getElementById("resultado").innerText +=
"\n\n⚠️ Este foi seu último teste gratuito."

}

}

function copiar(){

const texto=document.getElementById("resultado").innerText
navigator.clipboard.writeText(texto)

}

function whatsapp(){

const texto=encodeURIComponent(document.getElementById("resultado").innerText)
window.open("https://wa.me/?text="+texto)

}

function limpar(){

document.getElementById("resultado").innerText=""

}

{

if(aluno==="1"){
window.location.href="/app.html?aluno=1"
}else{
window.location.href="/app.html"
}

}

</script>

</body>
</html>
